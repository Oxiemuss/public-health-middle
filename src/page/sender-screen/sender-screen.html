<div class="min-h-screen bg-slate-50 py-10 px-4 font-sans">
  <div
    class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100"
  >
    <div class="bg-blue-600 p-6 text-center text-white">
      <h2 class="text-2xl font-bold tracking-tight">ระบบส่งข้อมูลผู้ป่วย</h2>

      <p class="text-blue-100 font-bold text-2xl ">ชื่อ รพ.สต. </p>
    </div>

    <form class="p-8 space-y-8">
      <section>
        <div class="flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
          <div class="w-2 h-6 bg-blue-500 rounded-full"></div>

          <h3 class="font-bold text-slate-800 text-lg">ข้อมูลผู้ป่วย</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-slate-600 mb-1"
              >เลขบัตรประชาชน 13 หลัก</label
            >

            <input
              type="text"
              inputmode="numeric"
              maxlength="13"
              placeholder="x-xxxx-xxxxx-xx-x"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-xl tracking-widest"
            />
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-slate-600 mb-1">ชื่อ-นามสกุล</label>

            <input
              type="text"
              placeholder="ระบุชื่อผู้ป่วย"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            />
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">วันเกิด</label>
            <input
              type="date"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            />
          </div>

          <div>
            <label class="text-sm font-semibold text-slate-700 mb-1">อายุ (ปี)</label>
            <input
              type="text"
              placeholder="ระบุอายุ"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-slate-600 mb-1"
              >เบอร์ติดต่อผู้ป่วย</label
            >

            <input
              type="tel"
              placeholder="0xx-xxxxxxx"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-slate-600 mb-1">ที่อยู่ปัจจุบัน</label>

            <textarea
              rows="2"
              placeholder="บ้านเลขที่, หมู่บ้าน, ตำบล"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none resize-none"
            ></textarea>
          </div>
        </div>
      </section>

      <section>
        <div class="flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
          <div class="w-2 h-6 bg-emerald-500 rounded-full"></div>

          <h3 class="font-bold text-slate-800 text-lg">ข้อมูลติดต่อญาติ</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">ชื่อญาติ</label>

            <input
              type="text"
              placeholder="ระบุชื่อผู้ติดต่อ"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">เบอร์ติดต่อญาติ</label>

            <input
              type="tel"
              placeholder="0xx-xxxxxxx"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"
            />
          </div>
        </div>
      </section>

      <section>
        <div class="flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
          <div class="w-2 h-6 bg-orange-500 rounded-full"></div>

          <h3 class="font-bold text-slate-800 text-lg">เอกสารแนบ</h3>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="relative group">
            <label
              class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-400 transition-all"
            >
              <div class="flex flex-col items-center justify-center py-4">
                <svg
                  class="w-8 h-8 text-slate-400 mb-2 group-hover:text-blue-500"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
                    stroke-width="2"
                  />

                  <circle cx="12" cy="13" r="3" stroke-width="2" />
                </svg>

                <p class="text-sm font-bold text-slate-700">ถ่ายรูปใบส่งตัว</p>

                <p class="text-xs text-slate-400 mt-1">กดเพื่อเปิดกล้อง</p>
              </div>

              <input type="file" class="hidden" accept="image/*" capture="environment" />
            </label>
          </div>

          <div class="relative group">
            <label
              class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-400 transition-all"
            >
              <div class="flex flex-col items-center justify-center py-4">
                <svg
                  class="w-8 h-8 text-slate-400 mb-2 group-hover:text-blue-500"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
                    stroke-width="2"
                  />
                </svg>

                <p class="text-sm font-bold text-slate-700">บัตรประชาชน</p>

                <p class="text-xs text-slate-400 mt-1">กดเพื่อเปิดกล้อง</p>
              </div>

              <input type="file" class="hidden" accept="image/*" capture="environment" />
            </label>
          </div>
        </div>
      </section>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white py-5 rounded-2xl font-bold text-xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-3"
      >
        <span>ส่งข้อมูล</span>

        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 5l7 7m0 0l-7 7m7-7H3"
          ></path>
        </svg>
      </button>
    </form>
  </div>
</div>
