<div class="min-h-screen bg-slate-50 py-10 px-4 font-sans">
  <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl shadow-slate-200/60 overflow-hidden border border-slate-100">
    
    <div class="bg-blue-600 p-6 text-center text-white">
      <h2 class="text-2xl font-bold tracking-tight">ระบบส่งข้อมูลผู้ป่วย (Referral)</h2>
      <p class="text-white font-bold text-xl mt-1">{{ h_name }}</p>
      <p class="text-white font-medium text-lg mt-1 opacity-90">เจ้าหน้าที่: {{ full_name }}</p>
    </div>

    <form class="p-8 space-y-8" [formGroup]="senderForm" (ngSubmit)="onSubmit()">
      
      <section>
        <div class="flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
          <div class="w-2 h-6 bg-blue-500 rounded-full"></div>
          <h3 class="font-bold text-slate-800 text-lg">ข้อมูลผู้ป่วย</h3>
        </div>
        </section>

      <section>
        <div class="flex items-center gap-2 mb-4 border-b border-slate-100 pb-2">
          <div class="w-2 h-6 bg-orange-500 rounded-full"></div>
          <h3 class="font-bold text-slate-800 text-lg">เอกสารแนบ</h3>
        </div>
        <p class="text-slate-500 text-xs mb-3">* รูปภาพไฟล์ละไม่เกิน 5 MB</p>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="relative group">
            <label class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-slate-300 rounded-2xl cursor-pointer bg-slate-50 hover:bg-blue-50 hover:border-blue-400 transition-all overflow-hidden relative">
              <input #referInput type="file" class="hidden" (change)="onFileChange($event, 'referral')" accept="image/*" capture="environment" />
              
              <button *ngIf="referralPreview" type="button" 
                (click)="$event.preventDefault(); $event.stopPropagation(); referralPreview = null; referralFile = null; referInput.value = ''"
                class="absolute top-2 right-2 z-20 bg-red-500 text-white p-1.5 rounded-full shadow-lg hover:bg-red-600 transition-transform active:scale-90">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </button>

              <img *ngIf="referralPreview" [src]="referralPreview" class="absolute inset-0 w-full h-full object-cover animate-in fade-in duration-500" />

              <div *ngIf="!referralPreview" class="flex flex-col items-center justify-center py-4 text-center">
                <svg class="w-8 h-8 text-slate-400 mb-2 group-hover:text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-width="2"/><circle cx="12" cy="13" r="3" stroke-width="2" /></svg>
                <p class="text-sm font-bold text-slate-700">ถ่ายรูปใบส่งตัว</p>
              </div>
            </label>
          </div>

          </div>
      </section>

      <button
        type="submit"
        [disabled]="senderForm.invalid"
        class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 active:scale-[0.98] text-white py-5 rounded-2xl font-bold text-xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-3"
      >
        <span>ส่งข้อมูลเข้าระบบ</span>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7m0 0l-7 7m7-7H3"></path>
        </svg>
      </button>
    </form>
  </div>

  </div>
