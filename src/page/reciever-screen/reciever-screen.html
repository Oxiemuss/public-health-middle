<main class="font-sans bg-slate-50 min-h-screen flex">
  <aside
    class="hidden lg:flex bg-white w-64 h-screen shadow-sm border-r border-slate-200 fixed left-0 top-0 flex-col p-6 z-20"
  >
    <div class="mb-10 px-2">
      <span
        class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent"
        >ระบบรับส่งผู้ป่วย</span
      >
    </div>
    <ul class="flex flex-col space-y-2 font-semibold text-slate-600">
      <li>
        <a
          href="#"
          class="flex items-center space-x-3 p-3 rounded-xl bg-blue-50 text-blue-600 transition"
        >
          <i class="fas fa-home"></i> <span>หน้าแรก (Dashboard)</span>
        </a>
      </li>
      <li>
        <a href="#" class="flex items-center space-x-3 p-3 rounded-xl hover:bg-slate-50 transition">
          <i class="fas fa-list"></i> <span>รายการผู้ป่วย</span>
        </a>
      </li>
    </ul>
  </aside>

  <div class="flex-1 lg:ml-64 flex flex-col">
    <header
      class="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-10"
    >
      <h2 class="font-bold text-slate-800">ระบบรับส่งต่อผู้ป่วย - รพ.บางปลาม้า</h2>
      <div class="flex items-center gap-4">
        <button class="relative p-2 text-slate-400 hover:text-blue-600 transition">♥</button>
        <p class="text-black-100 text-sm">รพ.บางปลาม้า</p>
      </div>
    </header>

    <div class="p-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-blue-600 p-6 rounded-3xl shadow-lg shadow-blue-200 text-white">
          <p class="text-blue-100 text-sm">เคสรอรับวันนี้</p>
          <p class="text-3xl font-bold">.... ราย</p>
        </div>
      </div>

      <div class="flex flex-col xl:flex-row gap-6">
        <div class="flex-1 bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
          <div class="p-6 border-b border-slate-50 flex justify-between items-center">
            <h3 class="font-bold text-slate-800">รายการรับเข้าล่าสุด</h3>
            <input
              type="text"
              placeholder="ค้นหา CID..."
              class="text-sm border border-slate-200 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <tbody class="divide-y divide-slate-50">
                <tr
                  class="hover:bg-slate-50/80 transition-colors cursor-pointer"
                  *ngFor="let item of referData"
                >
                  <td class="p-4 text-sm text-slate-500">{{ item.time }}</td>
                  <td class="p-4 font-bold text-slate-800">{{ item.patient_name }}</td>
                  <td class="p-4 text-center">
                    <button
                      class="text-blue-600 font-semibold hover:bg-blue-50 px-3 py-1 rounded-lg transition"
                    >
                      ดูหลักฐาน
                    </button>
                  </td>
                  <td class="p-4 text-right">
                    <button
                      class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md shadow-emerald-100"
                    >
                      รับเคส
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="w-full xl:w-80 space-y-4">
          <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
            <h4 class="font-bold text-slate-800 mb-4">สถานะรพ.สต. เครือข่าย</h4>
            <ul class="space-y-3">
              <!-- <li class="flex items-center justify-between text-sm p-3 bg-slate-50 rounded-2xl" *ngFor="let h of hospitals">
                <span class="text-slate-600">{{h.name}}</span>
                <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs font-bold">{{h.count}} เคส</span>
              </li> -->
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
