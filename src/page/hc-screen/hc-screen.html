<div class="flex flex-col xl:flex-row gap-6 p-6">
  <div class="flex-1 bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="p-6 border-b border-slate-50 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-1.5 h-6 bg-blue-600 rounded-full"></div>
        <h3 class="font-bold text-slate-800">รายชื่อ รพ.สต. และ เบอร์โทรติดต่อ</h3>
      </div>
      <div class="flex items-center gap-3 w-full sm:w-auto">
        <button
          (click)="loadHCenter(true)"
          [disabled]="isUpdating"
          class="relative flex items-center justify-center w-9 h-9 bg-white border border-slate-200 text-slate-600 rounded-xl hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 disabled:opacity-50 disabled:cursor-not-allowed transition-all active:scale-95 shadow-sm overflow-hidden"
          title="รีเฟรชข้อมูล"
        >
          <img
            src="arrows-rotate-solid-full.svg"
            [class.animate-spin]="isUpdating"
            class="w-5 h-5 opacity-70 transition-opacity group-hover:opacity-100"
            alt="refresh"
          />
        </button>

        <div class="relative flex-1 sm:w-64">
          <img
            src="magnifying-glass-solid-full.svg"
            class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 opacity-40"
            alt="search"
          />
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="ค้นหาชื่อ"
            (input)="onSearch()"
            class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all bg-slate-50/50"
          />
        </div>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-center">
        <thead class="bg-slate-50/50 text-slate-500 text-xs uppercase">
          <tr>
            <th class="p-4">รายชื่อ รพ.สต.</th>
            <th class="p-4">ตำบล</th>
            <th class="p-4">อำเภอ</th>
            <th class="p-4">จังหวัด</th>
            <th class="p-4 text-center">เบอร์โทรติดต่อ</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-50">
          <tr
            *ngFor="let item of filteredHCenter"
            class="group transition-all duration-200 hover:bg-blue-200 border-b border-slate-100 last:border-0"
          >
            <td class="p-4 text-start">{{ item.h_name }}</td>
            <td class="p-4">{{ item.h_tumbol }}</td>
            <td class="p-4">{{ item.h_district }}</td>
            <td class="p-4">{{ item.h_province }}</td>
            <td class="p-4">{{ item.contact_number }}</td>
          </tr>

          <tr *ngIf="h_center.length === 0 && !loading">
            <td colspan="5" class="p-10 text-center text-slate-400">ไม่มีรายการ</td>
          </tr>

          <tr *ngIf="h_center.length > 0 && h_center.length === 0 && !loading">
            <td colspan="5" class="p-10 text-center text-slate-400">
              ไม่พบข้อมูลที่ตรงกับคำค้นหา "{{ searchTerm }}"
            </td>
          </tr>

          <tr *ngIf="loading">
            <td colspan="5" class="p-10 text-center">
              <div class="flex flex-col items-center justify-center space-y-3">
                <div
                  class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"
                ></div>
                <p class="text-slate-500 text-sm animate-pulse">กำลังดึงข้อมูลล่าสุด...</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
