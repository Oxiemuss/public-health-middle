<main class="font-sans bg-slate-50 min-h-screen flex">
  <aside
    class="hidden lg:flex bg-white w-64 h-screen shadow-sm border-r border-slate-200 fixed left-0 top-0 flex-col p-6 z-20"
  >
    <div class="flex items-center gap-3 mb-10 px-2">
      <img
        src="image.png"
        alt="logo"
        class="w-10 h-10 object-contain hover:scale-110 transition-transform duration-300"
      />

      <span
        class="text-xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent"
      >
        ระบบรับส่งผู้ป่วย
      </span>
    </div>

    <nav class="flex-1">
      <ul class="flex flex-col space-y-2 font-semibold text-slate-600">
        <li>
          <a
            routerLink="/reciever"
            routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center space-x-3 p-3 rounded-xl bg-blue-50 text-blue-600 transition"
          >
            <i class="fas fa-home"></i> <span>หน้าแรก</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/history"
            routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center space-x-3 p-3 rounded-xl hover:bg-slate-50 transition"
          >
            <i class="fas fa-history"></i> <span>ประวัติการทำรายการ</span>
          </a>
        </li>
        <li>
          <a
            routerLink="/hclist"
            routerLinkActive="bg-blue-50 text-blue-600"
            class="flex items-center space-x-3 p-3 rounded-xl hover:bg-slate-50 transition"
          >
            <i class="fas fa-hospital"></i> <span>รายการ รพ.สต.</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="pt-6 border-t border-slate-100">
      <ul class="flex flex-col font-semibold text-slate-600">
        <li>
          <a
            class="flex items-center space-x-3 p-3 rounded-xl text-red-500 hover:bg-red-50 transition"
          >
            <i class="fas fa-sign-out-alt"></i> <span>ออกจากระบบ</span>
          </a>
        </li>
      </ul>
    </div>
  </aside>
  <div class="flex-1 lg:ml-64 flex flex-col">
    <header
      class="h-16 bg-white border-b border-slate-100 flex items-center justify-between px-8 sticky top-0 z-10"
    >
      <h2 class="font-bold text-slate-800">ระบบรับส่งต่อผู้ป่วย - รพ.บางปลาม้า</h2>
      <div class="flex items-center gap-4">
        <button class="relative p-2 text-slate-400 hover:text-blue-600 transition">
          <img
            src="bell-solid-full.svg"
            alt="notification icon"
            class="w-6 h-6 object-contain group-hover:scale-110 transition-transform"
          />
        </button>
        <p class="text-black-100 text-sm">รพ.บางปลาม้า</p>
      </div>
    </header>
    <router-outlet></router-outlet>
  </div>
</main>
