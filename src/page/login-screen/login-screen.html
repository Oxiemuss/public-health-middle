<div class="min-h-screen bg-slate-100 flex items-center justify-center px-4 py-4 font-sans">
  <div
    class="max-w-md w-full bg-white rounded-3xl shadow-2xl shadow-slate-300/50 overflow-hidden border border-slate-100"
  >
    <div class="bg-blue-600 p-8 text-center">
      <div class="inline-flex items-center justify-center w-35 h-35">
        <img src="image.png" alt="logo" class="w-35 h-35 object-contain" />
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">ระบบรับ-ส่งข้อมูลผู้ป่วย</h1>
    </div>

    <div class="p-8">
      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1 text-left"
            >ชื่อผู้ใช้งาน</label
          >
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                  stroke-width="2"
                />
              </svg>
            </span>
            <input
              formControlName="user_name"
              type="text"
              placeholder="ชื่อผู้ใช้งาน"
              class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            />
          </div>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-1 text-left">รหัสผ่าน</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                  stroke-width="2"
                />
              </svg>
            </span>
            <input
              formControlName="pass_word"
              type="text"
              placeholder="••••••••"
              class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            />
          </div>
        </div>

        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 transition-all active:scale-[0.98]"
        >
          เข้าสู่ระบบ
        </button>
      </form>
    </div>

    <div class="bg-slate-50 p-4 border-t border-slate-100 text-center">
      <span class="text-xs text-slate-400 p-1">หากลืมรหัสผ่าน กรุณาติดต่อฝ่าย IT</span>
      <a routerLink="/register" class="text-sm font-medium text-red-600 hover:text-red-500">
        สมัครใช้งาน
      </a>
    </div>
  </div>
</div>
