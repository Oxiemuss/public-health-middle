<div class="min-h-screen bg-slate-100 flex items-center justify-center px-4 py-4 font-sans">
  <div
    class="max-w-md w-full bg-white rounded-3xl shadow-2xl shadow-slate-300/50 overflow-hidden border border-slate-100"
  >
    <div class="bg-blue-600 p-8 text-center">
      <h1 class="text-2xl font-bold text-white tracking-tight">สมัครเข้าใช้งานระบบ</h1>
    </div>

    <div class="p-8">
      <form class="space-y-6" (ngSubmit)="onSubmit()">
  <div>
    <label class="block text-sm font-medium text-gray-700">ชื่อผู้ใช้งาน</label>
    <div class="mt-1">
      <input
        name="username"
        [(ngModel)]="userData.user_name"
        type="text"
        placeholder="ชื่อผู้ใช้งาน"
        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      />
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">รหัสผ่าน(8หลัก)</label>
    <div class="mt-1">
      <input
        name="password"
        [(ngModel)]="userData.pass_word"
        type="password"
        placeholder="••••••••"
        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      />
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">ชื่อ-นามสกุล</label>
    <div class="mt-1">
      <input
        name="fullname"
        [(ngModel)]="userData.full_name"
        type="text"
        placeholder="ชื่อ-นามสกุล"
        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      />
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700">เลขสถานพยาบาล (5 หลัก)</label>
    <div class="mt-1">
      <input
        name="hcode"
        [(ngModel)]="userData.hcode"
        type="text"
        maxlength="5"
        placeholder="00000"
        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm font-mono tracking-widest"
      />
    </div>
  </div>

  <div>
    <label class="block text-sm font-semibold text-slate-700 mb-2">สถานที่ทำงาน</label>
    <div class="grid grid-cols-2 gap-3">
      <button
        type="button"
        (click)="setRole('user')"
        [class.border-blue-500]="selectedRole === 'user'"
        [class.text-blue-500]="selectedRole === 'user'"
        [class.bg-blue-50]="selectedRole === 'user'"
        [class.border-slate-200]="selectedRole !== 'user'"
        class="border-2 py-2 rounded-xl text-sm font-bold transition-all"
      >
        รพ.สต.
      </button>

      <button
        type="button"
        (click)="setRole('admin')"
        [class.border-blue-500]="selectedRole === 'admin'"
        [class.text-blue-500]="selectedRole === 'admin'"
        [class.bg-blue-50]="selectedRole === 'admin'"
        [class.border-slate-200]="selectedRole !== 'admin'"
        class="border-2 py-2 rounded-xl text-sm font-bold transition-all"
      >
        รพ.บางปลาม้า
      </button>
    </div>
  </div>

  <div>
    <button
      type="submit"
      class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 transition-colors"
    >
      ลงทะเบียน
    </button>
  </div>
</form>
    </div>

    <div class="bg-slate-50 p-4 border-t border-slate-100 text-center">
      <a routerLink="/login" class="text-sm font-medium text-blue-600 hover:text-blue-500">
        มีบัญชีอยู่แล้ว? เข้าสู่ระบบ
      </a>
    </div>
  </div>
</div>
